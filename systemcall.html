<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>syscall 어셈블리 데모 — User ↔ Kernel Mode Switch</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --bg-tertiary: #eeeee8;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b66;
  --text-tertiary: #9c9a92;
  --border: rgba(0,0,0,0.1);
  --border-hover: rgba(0,0,0,0.2);
  --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
  --red-50: #FCEBEB; --red-400: #E24B4A; --red-800: #791F1F;
  --teal-600: #0F6E56;
  --coral-600: #D85A30;
  --purple-600: #534AB7;
  --amber-600: #BA7517;
  --green-50: #EAF3DE; --green-800: #27500A;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  --radius: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #242422;
    --bg-tertiary: #2c2c2a;
    --text-primary: #e8e6de;
    --text-secondary: #9c9a92;
    --text-tertiary: #6b6b66;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.2);
    --blue-50: #042C53; --blue-600: #85B7EB; --blue-800: #B5D4F4;
    --red-50: #501313; --red-400: #F09595; --red-800: #F7C1C1;
    --green-50: #173404; --green-800: #C0DD97;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem;
}
.container {
  max-width: 900px;
  width: 100%;
}
h1 {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
}
.main-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
}
.top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.mode-badge {
  display: inline-block;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-weight: 600;
  transition: all 0.4s;
}
.mode-user { background: var(--blue-50); color: var(--blue-800); }
.mode-kernel { background: var(--red-50); color: var(--red-800); }
.step-info {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-left: auto;
}
.grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 16px;
}
@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
}
.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 0;
  margin-bottom: 4px;
}
.code-block {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 12px;
}
.asm-line {
  display: flex;
  align-items: stretch;
  font-family: var(--font-mono);
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: background 0.3s, border-color 0.3s;
  min-height: 30px;
}
.asm-line.active { background: var(--blue-50); border-left-color: var(--blue-600); }
.asm-line.kernel-active { background: var(--red-50); border-left-color: var(--red-400); }
.asm-line.done { opacity: 0.35; }
.ln {
  min-width: 30px;
  text-align: right;
  padding: 5px 8px 5px 0;
  color: var(--text-tertiary);
  font-size: 11px;
  user-select: none;
}
.code {
  padding: 5px 10px;
  flex: 1;
  white-space: pre;
  color: var(--text-primary);
}
.cmt { color: var(--text-tertiary); }
.kw { color: var(--blue-600); }
.reg { color: var(--coral-600); }
.num { color: var(--teal-600); }
.lbl { color: var(--purple-600); font-weight: 600; }
.str { color: var(--amber-600); }
.regs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
  margin: 8px 0 12px;
}
.reg-card {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 6px 10px;
  transition: all 0.4s;
  position: relative;
}
.reg-card.has-tip { cursor: help; }
.reg-card:not(.has-tip) .reg-tip { display: none !important; }
.reg-card .reg-tip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-primary);
  color: var(--bg-primary);
  font-size: 11px;
  font-family: var(--font-sans);
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
  line-height: 1.4;
}
.reg-card .reg-tip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--text-primary);
}
.reg-card.has-tip:hover .reg-tip { display: block; }
.reg-card.changed { outline: 2px solid var(--red-400); outline-offset: -2px; }
.reg-card .rname { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; }
.reg-card .rval { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 1px; transition: color 0.3s; }
.reg-card.changed .rval { color: var(--red-400); }
.stack-vis { display: flex; gap: 16px; margin: 8px 0; }
.stack-col { flex: 1; }
.stack-title {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.stack-frame {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 8px;
  border-radius: 4px;
  margin-bottom: 3px;
  transition: all 0.3s;
}
.stack-frame.user-f { background: var(--blue-50); color: var(--blue-800); }
.stack-frame.kernel-f { background: var(--red-50); color: var(--red-800); }
.stack-frame.inactive { opacity: 0.3; }
.narration {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin: 1rem 0;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  min-height: 3.4em;
}
.narration code {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  background: var(--bg-tertiary);
  padding: 1px 5px;
  border-radius: 4px;
}
.ctrl-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.ctrl-btn {
  font-size: 13px;
  padding: 7px 18px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border-hover);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
}
.ctrl-btn:hover { background: var(--bg-secondary); }
.ctrl-btn:active { transform: scale(0.98); }
.ctrl-btn:disabled { opacity: 0.3; cursor: default; }
.auto-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: var(--radius);
  background: var(--green-50);
  color: var(--green-800);
}
.kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
}
.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 1.5rem;
}
</style>
</head>
<body>
<div class="container">
  <h1>syscall — user &#8596; kernel mode switch</h1>
  <p class="subtitle">x86-64 Linux에서 <code style="font-family:var(--font-mono);font-size:13px">sys_read</code>가 호출될 때 CPU 내부에서 벌어지는 일</p>

  <div class="main-card">
    <div class="top-bar">
      <span style="font-size:14px;font-weight:500;">CPU mode:</span>
      <span class="mode-badge mode-user" id="modeBadge">ring 3 (user)</span>
      <span class="step-info" id="stepInfo"></span>
    </div>

    <div class="grid">
      <div>
        <div class="section-label">user code (.text)</div>
        <div class="code-block" id="userCode"></div>
        <div class="section-label">kernel handler (ring 0)</div>
        <div class="code-block" id="kernelCode"></div>
      </div>
      <div>
        <div class="section-label">registers</div>
        <div class="regs" id="regs"></div>
        <div class="stack-vis">
          <div class="stack-col">
            <div class="stack-title">user stack</div>
            <div id="userStack"></div>
          </div>
          <div class="stack-col">
            <div class="stack-title">kernel stack</div>
            <div id="kernelStack"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="narration" id="narration"></div>

    <div class="ctrl-row">
      <button class="ctrl-btn" id="backBtn" onclick="back()">&larr; back <span class="kbd">&larr;</span></button>
      <button class="ctrl-btn" id="stepBtn" onclick="step()">step &rarr; <span class="kbd">space</span></button>
      <button class="ctrl-btn" id="autoBtn" onclick="toggleAuto()">auto play</button>
      <button class="ctrl-btn" onclick="reset()">reset <span class="kbd">r</span></button>
      <span id="autoLabel"></span>
    </div>
  </div>

  <p class="footer">&larr; = back &middot; space = step &middot; r = reset &middot; 강의용 인터랙티브 데모</p>
</div>

let cur = -1, autoId = null;
const $ = id => document.getElementById(id);

function renderCode(el, lines, prefix) {
  el.innerHTML = lines.map((l, i) =>
    '<div class="asm-line" id="' + prefix + i + '"><span class="ln">' + i + '</span><span class="code">' + l.code + ' <span class="cmt">' + l.cmt + '</span></span></div>'
  ).join('');
}
renderCode($('userCode'), userLines, 'u');
renderCode($('kernelCode'), kernelLines, 'k');

$('regs').innerHTML = regNames.map(r =>
  '<div class="reg-card' + (regDesc[r] ? ' has-tip' : '') + '" id="rc_' + r + '">' +
  (regDesc[r] ? '<span class="reg-tip">' + regDesc[r] + '</span>' : '') +
  '<div class="rname">' + r + '</div><div class="rval" id="rv_' + r + '">\u2014</div></div>'
).join('');

function render() {
  var s = steps[cur] || steps[0];
  userLines.forEach(function(_, i) {
    var el = $('u' + i);
    el.classList.remove('active', 'kernel-active', 'done');
    if (i === s.u) el.classList.add('active');
    else if (i < s.u || (s.isKernel && i <= s.u)) el.classList.add('done');
  });
  kernelLines.forEach(function(_, i) {
    var el = $('k' + i);
    el.classList.remove('active', 'kernel-active', 'done');
    if (i === s.k) el.classList.add('kernel-active');
    else if (i >= 0 && i < s.k) el.classList.add('done');
  });
  var changed = s.changed || [];
  regNames.forEach(function(r) {
    var card = $('rc_' + r);
    var val = $('rv_' + r);
    val.innerHTML = s.regs[r] || '\u2014';
    card.classList.toggle('changed', changed.indexOf(r) >= 0);
  });
  var mb = $('modeBadge');
  var isK = s.regs.mode === 'kernel' || s.regs.mode === '<b>kernel</b>';
  mb.className = 'mode-badge ' + (isK ? 'mode-kernel' : 'mode-user');
  mb.innerHTML = isK ? 'ring 0 (kernel)' : 'ring 3 (user)';
  if (s.regs.mode === '<b>TRAP!</b>') { mb.className = 'mode-badge mode-kernel'; mb.innerHTML = 'TRAP! mode switch...'; }
  $('narration').innerHTML = s.narr;
  $('stepInfo').textContent = 'step ' + (cur + 1) + ' / ' + steps.length;
  $('userStack').innerHTML = (s.ustack || []).map(function(f) {
    return '<div class="stack-frame user-f' + (s.isKernel ? ' inactive' : '') + '">' + f + '</div>';
  }).join('');
  $('kernelStack').innerHTML = (s.kstack || []).map(function(f) {
    return '<div class="stack-frame kernel-f">' + f + '</div>';
  }).join('');
  $('stepBtn').disabled = cur >= steps.length - 1;
  $('backBtn').disabled = cur <= 0;
}

function back() {
  if (cur > 0) { cur--; render(); }
}

function step() {
  if (cur < steps.length - 1) { cur++; render(); }
  else if (autoId) { toggleAuto(); }
}

function reset() {
  if (autoId) toggleAuto();
  cur = 0; render();
}

function toggleAuto() {
  if (autoId) {
    clearInterval(autoId); autoId = null;
    $('autoBtn').textContent = 'auto play';
    $('autoLabel').textContent = '';
  } else {
    autoId = setInterval(function() {
      if (cur >= steps.length - 1) { toggleAuto(); return; }
      step();
    }, 1400);
    $('autoBtn').textContent = 'pause';
    $('autoLabel').innerHTML = '<span class="auto-badge">playing</span>';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); step(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); step(); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); back(); }
  if (e.code === 'KeyR') { reset(); }
});

cur = 0; render();
</script>
