<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>서울대공원 토요일 코스</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text-sub: #6B6560;
  --text-hint: #9C9690;
  --accent: #2D6A4F;
  --accent-light: #D8F3DC;
  --accent-dark: #1B4332;
  --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}

/* ─── Hero ─── */
.hero {
  position: relative;
  background: linear-gradient(165deg, #1B4332 0%, #2D6A4F 40%, #40916C 100%);
  padding: 56px 24px 80px;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
  position: relative;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 7vw, 42px);
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  position: relative;
}
.hero-meta {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  position: relative;
}
.hero-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  font-size: 12px;
  font-weight: 400;
  padding: 6px 12px;
  border-radius: 100px;
}
.hero-chip svg { flex-shrink: 0; }

/* ─── Stats bar ─── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  margin: -40px 16px 0;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  position: relative;
  z-index: 10;
}
.stat-item {
  background: var(--card);
  text-align: center;
  padding: 18px 8px;
}
.stat-val {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-dark);
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--text-hint);
  margin-top: 4px;
  font-weight: 400;
}

/* ─── Map ─── */
.map-section { padding: 28px 16px 0; }
.map-wrap {
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}
#map { height: 280px; width: 100%; }

/* ─── Timeline ─── */
.timeline-section { padding: 32px 16px 40px; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-hint);
  margin-bottom: 20px;
}

.timeline { position: relative; padding-left: 28px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 9px;
  top: 24px;
  bottom: 24px;
  width: 2px;
  background: linear-gradient(180deg, var(--accent) 0%, #B7E4C7 50%, var(--accent) 100%);
  border-radius: 2px;
}

.stop {
  position: relative;
  margin-bottom: 16px;
  animation: fadeUp 0.5s ease both;
}
.stop:nth-child(1) { animation-delay: .1s }
.stop:nth-child(2) { animation-delay: .2s }
.stop:nth-child(3) { animation-delay: .3s }
.stop:nth-child(4) { animation-delay: .4s }
.stop:nth-child(5) { animation-delay: .5s }
.stop:nth-child(6) { animation-delay: .6s }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.stop-dot {
  position: absolute;
  left: -28px;
  top: 20px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  z-index: 2;
  box-shadow: 0 0 0 4px var(--bg);
  transition: transform .2s;
}
.stop.active .stop-dot { transform: scale(1.25); }

.stop-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: box-shadow .2s, border-color .2s;
}
.stop-card:hover,
.stop.active .stop-card {
  box-shadow: var(--shadow-md);
  border-color: rgba(45,106,79,0.2);
}

.stop-time {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.stop-name {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.stop-desc {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.7;
  margin-top: 6px;
}
.stop-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  background: #F0F0EC;
  color: var(--text-sub);
}
.stop-tip {
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--accent-dark);
  background: var(--accent-light);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: none;
}
.stop-tip::before { content: '💡 '; }
.stop.active .stop-tip { display: block; }

/* ─── Branch / Option selector ─── */
.branch { position: relative; margin-bottom: 16px; }
.branch .stop-dot {
  position: absolute;
  left: -28px;
  top: 20px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  z-index: 2;
  box-shadow: 0 0 0 4px var(--bg);
  background: linear-gradient(135deg, #7C3AED, #2D6A4F);
}
.branch-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-hint);
  margin-bottom: 10px;
}
.branch {
  animation: fadeUp 0.5s ease both;
  animation-delay: .5s;
}
.branch-options { display: grid; gap: 10px; }
.option-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  border: 2px solid transparent;
  outline: 1px solid var(--border);
  cursor: pointer;
  transition: border-color .25s, box-shadow .25s, transform .15s;
  position: relative;
  overflow: hidden;
}
.option-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.option-card.selected { box-shadow: var(--shadow-md); outline: none; }
.option-card.selected.opt-a { border-color: #7C3AED; }
.option-card.selected.opt-b { border-color: #2D6A4F; }
.option-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.option-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 100px;
  color: #fff;
  flex-shrink: 0;
}
.opt-a .option-badge { background: #7C3AED; }
.opt-b .option-badge { background: #2D6A4F; }
.option-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.option-desc {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.7;
  margin-top: 2px;
}
.option-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.option-tip {
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.6;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  display: none;
}
.option-card.selected .option-tip { display: block; }
.opt-a .option-tip { color: #3C3489; background: #EEEDFE; }
.opt-b .option-tip { color: #1B4332; background: #D8F3DC; }
.option-tip::before { content: '💡 '; }
.option-check {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.option-card.selected .option-check { border-color: transparent; }
.opt-a.selected .option-check { background: #7C3AED; }
.opt-b.selected .option-check { background: #2D6A4F; }
.option-check svg { opacity: 0; transition: opacity .2s; }
.option-card.selected .option-check svg { opacity: 1; }

/* ─── Pre-step (arrival) ─── */
.pre-step {
  position: relative;
  margin-bottom: 20px;
  animation: fadeUp 0.5s ease both;
}
.pre-step .stop-dot {
  position: absolute;
  left: -28px;
  top: 20px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  z-index: 2;
  box-shadow: 0 0 0 4px var(--bg);
  background: #0EA5E9;
}
.pre-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  border-top: 3px solid #0EA5E9;
}
.pre-card .stop-time { font-size: 11px; font-weight: 600; color: #0EA5E9; letter-spacing: 0.5px; margin-bottom: 6px; }
.pre-card .stop-name { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.3; }
.pre-card .stop-desc { font-size: 13px; color: var(--text-sub); line-height: 1.7; margin-top: 6px; }
.ticket-section { margin-top: 14px; }
.ticket-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-hint);
  margin-bottom: 8px;
}
.ticket-grid {
  display: grid;
  gap: 6px;
}
.ticket-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 8px 12px;
  background: #F8F8F6;
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.ticket-row .t-name { color: var(--text); font-weight: 500; }
.ticket-row .t-name small { font-weight: 400; color: var(--text-hint); font-size: 11px; margin-left: 4px; }
.ticket-row .t-price { font-weight: 600; color: var(--accent-dark); white-space: nowrap; }
.ticket-combo {
  margin-top: 8px;
  padding: 10px 12px;
  background: linear-gradient(135deg, #EFF6FF, #F0FDF4);
  border-radius: var(--radius-sm);
  border: 1px dashed #86EFAC;
}
.ticket-combo .combo-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-dark);
  margin-bottom: 4px;
}
.ticket-combo .combo-desc { font-size: 12px; color: var(--text-sub); line-height: 1.6; }
.ticket-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.ticket-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 100px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-sub);
  text-decoration: none;
  transition: border-color .2s, color .2s;
}
.ticket-link:hover { border-color: var(--accent); color: var(--accent); }
.pre-tip {
  margin-top: 12px;
  font-size: 12px;
  line-height: 1.6;
  color: #0C4A6E;
  background: #E0F2FE;
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.pre-tip::before { content: '💡 '; }

/* ─── Color per stop ─── */
.stop[data-color="sky"] .stop-dot { background: #3B82F6; }
.stop[data-color="sky"] .stop-time { color: #3B82F6; }
.stop[data-color="green"] .stop-dot { background: #2D6A4F; }
.stop[data-color="green"] .stop-time { color: #2D6A4F; }
.stop[data-color="amber"] .stop-dot { background: #D97706; }
.stop[data-color="amber"] .stop-time { color: #D97706; }
.stop[data-color="rose"] .stop-dot { background: #E11D48; }
.stop[data-color="rose"] .stop-time { color: #E11D48; }
.stop[data-color="purple"] .stop-dot { background: #7C3AED; }
.stop[data-color="purple"] .stop-time { color: #7C3AED; }
.stop[data-color="gray"] .stop-dot { background: #78716C; }
.stop[data-color="gray"] .stop-time { color: #78716C; }

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 0 16px 48px;
  font-size: 11px;
  color: var(--text-hint);
  line-height: 1.6;
}

/* ─── Leaflet overrides ─── */
.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
  font-family: var(--font) !important;
}
.leaflet-popup-content { margin: 12px 14px !important; font-size: 13px; line-height: 1.5; }
.leaflet-popup-content b { font-weight: 600; }
.popup-time { font-size: 11px; color: #6B6560; margin-top: 2px; }
.custom-marker {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font);
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  border: 2.5px solid #fff;
  transition: transform .2s;
}
.custom-marker.highlight { transform: scale(1.3); }

/* ─── Responsive ─── */
@media (min-width: 640px) {
  .hero { padding: 64px 32px 88px; }
  .stats-bar { margin: -40px 32px 0; }
  .map-section, .timeline-section { padding-left: 32px; padding-right: 32px; }
  #map { height: 360px; }
  .footer { padding-bottom: 56px; }
}
@media (min-width: 768px) {
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 32px;
  }
  .map-section { padding: 0; position: sticky; top: 16px; align-self: start; }
  .timeline-section { padding: 0; }
  #map { height: 480px; }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-label">Saturday itinerary</div>
  <h1>서울대공원<br>토요일 코스</h1>
  <div class="hero-meta">
    <span class="hero-chip">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      11:00 AM — 5:00 PM
    </span>
    <span class="hero-chip">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      과천시 · 서울대공원
    </span>
    <span class="hero-chip">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      7곳 방문
    </span>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-val">6h</div><div class="stat-label">총 소요</div></div>
  <div class="stat-item"><div class="stat-val">~4km</div><div class="stat-label">도보 거리</div></div>
  <div class="stat-item"><div class="stat-val">7곳</div><div class="stat-label">방문 포인트</div></div>
</div>

<!-- Content -->
<div class="content-grid">
  <!-- Map -->
  <div class="map-section">
    <div class="map-wrap"><div id="map"></div></div>
  </div>

  <!-- Timeline -->
  <div class="timeline-section">
    <div class="section-title">코스 일정</div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  지도 데이터 © OpenStreetMap contributors · Leaflet<br>
  서울대공원 토요일 코스 · 2026년 4월
</div>

<script>

  {

  {

  },
  {
    num: 4, color: 'rose',

    desc: '장미원 · 어린이동물원 · 호수 산책로를 여유롭게 산책. 4월 초라 벚꽃과 봄꽃이 절정.',
    tags: ['약 60분', '봄꽃 시즌', '포토존'],
    tip: '테마가든은 동물원과 별도 입장료(성인 2,000원). 호수 둘레길로 돌면 미술관 방향과 자연스럽게 연결돼요.',
    lat: 37.430682, lng: 127.015502,
    markerColor: '#E11D48'
  }
];

const optionA = {
  name: '국립현대미술관 과천',
  time: '15:30 — 16:45',
  desc: '테마가든에서 도보 10분. 넓고 여유로운 전시 공간에서 현대미술 감상. 야외 조각공원 필수 코스.',
  tags: ['약 75분', '토요일 개관', '야외 조각'],
  tip: '매월 마지막 수요일은 무료 입장. 토요일은 유료이니 참고하세요.',
  lat: 37.43104, lng: 127.01996,
  markerColor: '#7C3AED'
};

const optionB = {
  name: '동물원 심화 관람',
  time: '15:30 — 16:45',
  desc: '오전에 못 본 아프리카관 · 남미관 · 호주관 등을 여유롭게 재탐방. 오후엔 한적해서 사진 찍기도 좋아요.',
  tags: ['약 75분', '한적한 오후', '사진 타임'],
  tip: '오후 3시 이후 동물원은 인파가 줄어들어 여유롭게 관람할 수 있어요.',
  lat: 37.4245, lng: 127.0210,
  markerColor: '#2D6A4F'
};

const endStopData = {
  a: {
    num: 6, color: 'gray',
    name: '코스 마무리',
    time: '16:45 — 17:00',
    desc: '미술관 앞 광장에서 대공원역 방향으로 이동. 코끼리열차 또는 도보 15분으로 지하철역 복귀.',
    tags: ['코끼리열차', '4호선 대공원역'],
    tip: '',
    lat: 37.4275, lng: 127.017,
    markerColor: '#78716C'
  },
  b: {
    num: 6, color: 'gray',
    name: '코스 마무리',
    time: '16:45 — 17:00',
    desc: '동물원 정문에서 스카이리프트 하행 또는 코끼리열차로 대공원역까지 복귀.',
    tags: ['스카이리프트 하행', '4호선 대공원역'],
    tip: '',
    lat: 37.4285, lng: 127.0159,
    markerColor: '#78716C'
  }
};

let selectedOption = 'a';

// ─── Render timeline ───
const timeline = document.getElementById('timeline');

// Pre-step: Arrival & Tickets
const preDiv = document.createElement('div');
preDiv.className = 'pre-step';
preDiv.innerHTML = `
  <div class="stop-dot">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M12 2v20M5 9l7-7 7 7"/></svg>
  </div>
  <div class="pre-card">
    <div class="stop-time">11:00 — 11:30 · 도착 & 준비</div>
    <div class="stop-name">서울대공원역 도착 · 티켓 구매</div>
    <div class="stop-desc">4호선 대공원역 2번 출구로 나와 분수대 광장 방향으로 도보 5분. 종합안내소 앞 잔디광장에서 우측 200m 지점에 스카이리프트 매표소가 있어요.</div>

    <div class="ticket-section">
      <div class="ticket-section-title">동물원 입장료</div>
      <div class="ticket-grid">
        <div class="ticket-row"><span class="t-name">성인<small>19세 이상</small></span><span class="t-price">5,000원</span></div>
        <div class="ticket-row"><span class="t-name">청소년<small>13~18세</small></span><span class="t-price">3,000원</span></div>
        <div class="ticket-row"><span class="t-name">어린이<small>6~12세</small></span><span class="t-price">2,000원</span></div>
      </div>
    </div>

    <div class="ticket-section">
      <div class="ticket-section-title">스카이리프트</div>
      <div class="ticket-grid">
        <div class="ticket-row"><span class="t-name">1회권<small>1개 구간</small></span><span class="t-price">9,000원</span></div>
        <div class="ticket-row"><span class="t-name">2회권<small>2개 구간</small></span><span class="t-price">16,000원</span></div>
        <div class="ticket-row"><span class="t-name">당일권<small>무제한</small></span><span class="t-price">21,000원</span></div>
      </div>
    </div>

    <div class="ticket-combo">
      <div class="combo-label">온라인 콤보 패키지 (사전 예매 추천)</div>
      <div class="combo-desc">동물원 입장 + 리프트 1회 패키지를 Klook·KKday·Waug 등에서 사전 예매하면 현장보다 저렴하고, QR코드로 매표소 줄 없이 바로 입장할 수 있어요. 단, 일부 판매처는 <b>당일 구매 불가</b>(전날까지 구매 필수)이니 꼭 확인하세요.</div>
    </div>

    <div class="ticket-links">
      <a class="ticket-link" href="https://www.klook.com/ko/activity/55718" target="_blank" rel="noopener">Klook ↗</a>
      <a class="ticket-link" href="https://www.kkday.com/ko/product/105602" target="_blank" rel="noopener">KKday ↗</a>
      <a class="ticket-link" href="https://www.waug.com/ko/activities/113546" target="_blank" rel="noopener">Waug ↗</a>
      <a class="ticket-link" href="https://home-ticket.co.kr/skylift/" target="_blank" rel="noopener">공식 예매 ↗</a>
    </div>

    <div class="pre-tip">토요일은 리프트 대기줄이 길어질 수 있어요. 온라인 콤보 티켓을 미리 구매하면 현장에서 10~15분 절약! 참고로 스카이리프트는 2026년 중 곤돌라 교체 공사로 운행 중단 예정이니, 방문 전 <b>skylift.co.kr</b>에서 운행 여부를 꼭 확인하세요.</div>
  </div>
`;
timeline.appendChild(preDiv);

// Stops 1-4
stops.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'stop';
  div.dataset.color = s.color;
  div.dataset.index = i;
  div.innerHTML = `
    <div class="stop-dot">${s.num}</div>
    <div class="stop-card">
      <div class="stop-time">${s.time}</div>
      <div class="stop-name">${s.name}</div>
      <div class="stop-desc">${s.desc}</div>
      <div class="stop-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      ${s.tip ? `<div class="stop-tip">${s.tip}</div>` : ''}
    </div>
  `;
  div.addEventListener('click', () => activateStop(i));
  timeline.appendChild(div);
});

// Branch node (stop 5)
const branchDiv = document.createElement('div');
branchDiv.className = 'branch';
branchDiv.dataset.index = 4;
branchDiv.innerHTML = `
  <div class="stop-dot">5</div>
  <div class="branch-label">15:30 — 16:45 · 코스를 선택하세요</div>
  <div class="branch-options">
    <div class="option-card opt-a selected" data-opt="a" onclick="selectOption('a')">
      <div class="option-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="option-header">
        <span class="option-badge">옵션 A</span>
        <span class="option-title">${optionA.name}</span>
      </div>
      <div class="option-desc">${optionA.desc}</div>
      <div class="option-tags">${optionA.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="option-tip">${optionA.tip}</div>
    </div>
    <div class="option-card opt-b" data-opt="b" onclick="selectOption('b')">
      <div class="option-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="option-header">
        <span class="option-badge">옵션 B</span>
        <span class="option-title">${optionB.name}</span>
      </div>
      <div class="option-desc">${optionB.desc}</div>
      <div class="option-tags">${optionB.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="option-tip">${optionB.tip}</div>
    </div>
  </div>
`;
timeline.appendChild(branchDiv);

// Stop 6 (end — adapts to option)
const endDiv = document.createElement('div');
endDiv.className = 'stop';
endDiv.id = 'end-stop';
endDiv.dataset.color = 'gray';
endDiv.dataset.index = 5;
timeline.appendChild(endDiv);
renderEndStop('a');

function renderEndStop(opt) {
  const s = endStopData[opt];
  endDiv.innerHTML = `
    <div class="stop-dot">${s.num}</div>
    <div class="stop-card">
      <div class="stop-time">${s.time}</div>
      <div class="stop-name">${s.name}</div>
      <div class="stop-desc">${s.desc}</div>
      <div class="stop-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;
}

// ─── Map ───
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([37.4290, 127.0155], 15);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© OpenStreetMap'
}).addTo(map);

// Station marker (pre-step)
const stationCoords = [37.4337, 127.0117];
const stationIcon = L.divIcon({
  className: '',
  html: `<div class="custom-marker" style="background:#0EA5E9;width:28px;height:28px;font-size:11px;border-width:2px">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M5 9l7-7 7 7"/></svg>
  </div>`,
  iconSize: [28, 28],
  iconAnchor: [14, 14]
});
const stationMarker = L.marker(stationCoords, { icon: stationIcon }).addTo(map);
stationMarker.bindPopup(`<b>대공원역 2번 출구</b><div class="popup-time">10:50 도착 · 티켓 구매</div>`);

// Base markers (stops 1-4)
const markers = stops.map((s, i) => {
  const icon = L.divIcon({
    className: '',
    html: `<div class="custom-marker" id="marker-${i}" style="background:${s.markerColor}">${s.num}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);
  marker.bindPopup(`<b>${s.name}</b><div class="popup-time">${s.time}</div>`);
  marker.on('click', () => activateStop(i));
  return marker;
});

// Option markers
let markerOptA, markerOptB, markerEnd, routeLine;

function createOptMarker(data, num, opacity) {
  const icon = L.divIcon({
    className: '',
    html: `<div class="custom-marker" id="marker-opt-${num}" style="background:${data.markerColor};opacity:${opacity}">${num}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  const m = L.marker([data.lat, data.lng], { icon }).addTo(map);
  m.bindPopup(`<b>${data.name}</b><div class="popup-time">${data.time}</div>`);
  return m;
}

function buildRoute() {
  if (routeLine) map.removeLayer(routeLine);
  if (markerOptA) map.removeLayer(markerOptA);
  if (markerOptB) map.removeLayer(markerOptB);
  if (markerEnd) map.removeLayer(markerEnd);

  const opt = selectedOption;
  const activeOpt = opt === 'a' ? optionA : optionB;
  const dimOpt = opt === 'a' ? optionB : optionA;
  const end = endStopData[opt];

  markerOptA = createOptMarker(activeOpt, '5', 1);
  markerOptB = createOptMarker(dimOpt, '5', 0.35);
  markerOptA.on('click', () => {
    map.flyTo([activeOpt.lat, activeOpt.lng], 16, { duration: 0.5 });
    markerOptA.openPopup();
  });

  const endIcon = L.divIcon({
    className: '',
    html: `<div class="custom-marker" id="marker-end" style="background:${end.markerColor}">6</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  markerEnd = L.marker([end.lat, end.lng], { icon: endIcon }).addTo(map);
  markerEnd.bindPopup(`<b>${end.name}</b><div class="popup-time">${end.time}</div>`);

  const latlngs = [
    stationCoords,
    ...stops.map(s => [s.lat, s.lng]),
    [activeOpt.lat, activeOpt.lng],
    [end.lat, end.lng]
  ];
  routeLine = L.polyline(latlngs, {
    color: '#2D6A4F',
    weight: 3,
    opacity: 0.5,
    dashArray: '8 6',
    lineCap: 'round'
  }).addTo(map);

  map.fitBounds(latlngs, { padding: [30, 30] });
}

buildRoute();

// ─── Option selection ───
function selectOption(opt) {
  selectedOption = opt;
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.option-card[data-opt="${opt}"]`).classList.add('selected');
  renderEndStop(opt);
  buildRoute();

  const target = opt === 'a' ? optionA : optionB;
  map.flyTo([target.lat, target.lng], 16, { duration: 0.5 });
}

// ─── Stop interaction ───
let activeIndex = -1;
function activateStop(i) {
  document.querySelectorAll('.stop').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.custom-marker').forEach(el => el.classList.remove('highlight'));

  const stop = document.querySelector(`.stop[data-index="${i}"]`);
  const markerEl = document.getElementById(`marker-${i}`);

  if (activeIndex === i) {
    activeIndex = -1;
    map.flyTo([37.4290, 127.0155], 15, { duration: 0.5 });
    return;
  }

  activeIndex = i;
  if (stop) {
    stop.classList.add('active');
    stop.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  if (markerEl) markerEl.classList.add('highlight');

  map.flyTo([stops[i].lat, stops[i].lng], 16, { duration: 0.5 });
  markers[i].openPopup();
}
</script>
</body>
</html>
