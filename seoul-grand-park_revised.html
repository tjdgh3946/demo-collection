<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>서울대공원 토요일 코스</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--card:#FFFFFF;--text:#1A1A1A;--text-sub:#6B6560;--text-hint:#9C9690;--accent:#2D6A4F;--accent-light:#D8F3DC;--accent-dark:#1B4332;--border:rgba(0,0,0,0.06);--shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.04);--shadow-lg:0 12px 40px rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;--font-display:'Playfair Display',Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100dvh}
.hero{position:relative;background:linear-gradient(165deg,#1B4332 0%,#2D6A4F 40%,#40916C 100%);padding:56px 24px 80px;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-label{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:12px;position:relative}
.hero h1{font-family:var(--font-display);font-size:clamp(28px,7vw,42px);font-weight:700;color:#fff;line-height:1.2;position:relative}
.hero-meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;position:relative}
.hero-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);font-size:12px;font-weight:400;padding:6px 12px;border-radius:100px}
.hero-chip svg{flex-shrink:0}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:-40px 16px 0;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);position:relative;z-index:10}
.stat-item{background:var(--card);text-align:center;padding:18px 8px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent-dark);line-height:1}
.stat-label{font-size:11px;color:var(--text-hint);margin-top:4px;font-weight:400}
.map-section{padding:28px 16px 0}.map-wrap{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);border:1px solid var(--border)}#map{height:280px;width:100%}
.timeline-section{padding:32px 16px 40px}.section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-hint);margin-bottom:20px}
.timeline{position:relative;padding-left:28px}.timeline::before{content:'';position:absolute;left:9px;top:24px;bottom:24px;width:2px;background:linear-gradient(180deg,var(--accent) 0%,#B7E4C7 50%,var(--accent) 100%);border-radius:2px}
.stop{position:relative;margin-bottom:16px;animation:fadeUp .5s ease both}
.stop:nth-child(1){animation-delay:.05s}.stop:nth-child(2){animation-delay:.1s}.stop:nth-child(3){animation-delay:.15s}.stop:nth-child(4){animation-delay:.2s}.stop:nth-child(5){animation-delay:.25s}.stop:nth-child(6){animation-delay:.3s}.stop:nth-child(7){animation-delay:.35s}.stop:nth-child(8){animation-delay:.4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stop-dot{position:absolute;left:-28px;top:20px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;z-index:2;box-shadow:0 0 0 4px var(--bg);transition:transform .2s}
.stop.active .stop-dot{transform:scale(1.25)}
.stop-card{background:var(--card);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,border-color .2s}
.stop-card:hover,.stop.active .stop-card{box-shadow:var(--shadow-md);border-color:rgba(45,106,79,0.2)}
.stop-time{font-size:11px;font-weight:600;letter-spacing:.5px;margin-bottom:6px}.stop-name{font-size:17px;font-weight:600;color:var(--text);line-height:1.3}
.stop-desc{font-size:13px;color:var(--text-sub);line-height:1.7;margin-top:6px}
.stop-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;background:#F0F0EC;color:var(--text-sub)}
.stop-tip{margin-top:10px;font-size:12px;line-height:1.6;color:var(--accent-dark);background:var(--accent-light);border-radius:var(--radius-sm);padding:10px 12px;display:none}.stop-tip::before{content:'💡 '}.stop.active .stop-tip{display:block}
.pre-step{position:relative;margin-bottom:20px;animation:fadeUp .5s ease both}
.pre-step .stop-dot{position:absolute;left:-28px;top:20px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;z-index:2;box-shadow:0 0 0 4px var(--bg);background:#0EA5E9}
.pre-card{background:var(--card);border-radius:var(--radius);padding:18px 18px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);border-top:3px solid #0EA5E9}
.pre-card .stop-time{font-size:11px;font-weight:600;color:#0EA5E9;letter-spacing:.5px;margin-bottom:6px}
.pre-card .stop-name{font-size:17px;font-weight:600;color:var(--text);line-height:1.3}
.pre-card .stop-desc{font-size:13px;color:var(--text-sub);line-height:1.7;margin-top:6px}
.ticket-section{margin-top:14px}.ticket-section-title{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-hint);margin-bottom:8px}
.ticket-grid{display:grid;gap:6px}
.ticket-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:8px 12px;background:#F8F8F6;border-radius:var(--radius-sm);font-size:13px}
.ticket-row .t-name{color:var(--text);font-weight:500}.ticket-row .t-name small{font-weight:400;color:var(--text-hint);font-size:11px;margin-left:4px}
.ticket-row .t-price{font-weight:600;color:var(--accent-dark);white-space:nowrap}
.ticket-row.t-total{background:#1B4332}.ticket-row.t-total .t-name{color:rgba(255,255,255,.8);font-weight:600}.ticket-row.t-total .t-price{color:#fff;font-size:15px}
.ticket-combo{margin-top:10px;padding:10px 12px;background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border-radius:var(--radius-sm);border:1px dashed #86EFAC}
.ticket-combo .combo-label{font-size:11px;font-weight:600;color:var(--accent-dark);margin-bottom:4px}
.ticket-combo .combo-desc{font-size:12px;color:var(--text-sub);line-height:1.6}
.ticket-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ticket-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:5px 10px;border-radius:100px;background:var(--card);border:1px solid var(--border);color:var(--text-sub);text-decoration:none;transition:border-color .2s,color .2s}
.ticket-link:hover{border-color:var(--accent);color:var(--accent)}
.pre-tip{margin-top:12px;font-size:12px;line-height:1.6;color:#0C4A6E;background:#E0F2FE;border-radius:var(--radius-sm);padding:10px 12px}.pre-tip::before{content:'⚠️ '}
.branch{position:relative;margin-bottom:16px;animation:fadeUp .5s ease both;animation-delay:.35s}
.branch .stop-dot{position:absolute;left:-28px;top:20px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;z-index:2;box-shadow:0 0 0 4px var(--bg);background:linear-gradient(135deg,#7C3AED,#2D6A4F)}
.branch-label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text-hint);margin-bottom:10px}
.branch-options{display:grid;gap:10px}
.option-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);border:2px solid transparent;outline:1px solid var(--border);cursor:pointer;transition:border-color .25s,box-shadow .25s,transform .15s;position:relative;overflow:hidden}
.option-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}.option-card.selected{box-shadow:var(--shadow-md);outline:none}
.option-card.selected.opt-a{border-color:#7C3AED}.option-card.selected.opt-b{border-color:#2D6A4F}
.option-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.option-badge{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:100px;color:#fff;flex-shrink:0}
.opt-a .option-badge{background:#7C3AED}.opt-b .option-badge{background:#2D6A4F}
.option-title{font-size:15px;font-weight:600;color:var(--text)}.option-desc{font-size:13px;color:var(--text-sub);line-height:1.7;margin-top:2px}
.option-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.option-tip{margin-top:10px;font-size:12px;line-height:1.6;padding:10px 12px;border-radius:var(--radius-sm);display:none}
.option-card.selected .option-tip{display:block}.opt-a .option-tip{color:#3C3489;background:#EEEDFE}.opt-b .option-tip{color:#1B4332;background:#D8F3DC}.option-tip::before{content:'💡 '}
.option-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;transition:all .2s}
.option-card.selected .option-check{border-color:transparent}.opt-a.selected .option-check{background:#7C3AED}.opt-b.selected .option-check{background:#2D6A4F}
.option-check svg{opacity:0;transition:opacity .2s}.option-card.selected .option-check svg{opacity:1}
.stop[data-color="sky"] .stop-dot{background:#3B82F6}.stop[data-color="sky"] .stop-time{color:#3B82F6}
.stop[data-color="green"] .stop-dot{background:#2D6A4F}.stop[data-color="green"] .stop-time{color:#2D6A4F}
.stop[data-color="amber"] .stop-dot{background:#D97706}.stop[data-color="amber"] .stop-time{color:#D97706}
.stop[data-color="rose"] .stop-dot{background:#E11D48}.stop[data-color="rose"] .stop-time{color:#E11D48}
.stop[data-color="purple"] .stop-dot{background:#7C3AED}.stop[data-color="purple"] .stop-time{color:#7C3AED}
.stop[data-color="gray"] .stop-dot{background:#78716C}.stop[data-color="gray"] .stop-time{color:#78716C}
.footer{text-align:center;padding:0 16px 48px;font-size:11px;color:var(--text-hint);line-height:1.6}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.12)!important;font-family:var(--font)!important}
.leaflet-popup-content{margin:12px 14px!important;font-size:13px;line-height:1.5}.leaflet-popup-content b{font-weight:600}
.popup-time{font-size:11px;color:#6B6560;margin-top:2px}
.custom-marker{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;color:#fff;font-size:13px;font-weight:700;font-family:var(--font);box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2.5px solid #fff;transition:transform .2s}
.custom-marker.highlight{transform:scale(1.3)}
.route-legend{display:flex;align-items:center;gap:14px;padding:10px 0;margin-top:4px;font-size:11px;color:var(--text-hint);flex-wrap:wrap}
.route-legend span{display:inline-flex;align-items:center;gap:4px}.legend-line{width:20px;height:3px;border-radius:2px;flex-shrink:0}
@media(min-width:640px){.hero{padding:64px 32px 88px}.stats-bar{margin:-40px 32px 0}.map-section,.timeline-section{padding-left:32px;padding-right:32px}#map{height:360px}.footer{padding-bottom:56px}}
@media(min-width:768px){.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:32px}.map-section{padding:0;position:sticky;top:16px;align-self:start}.timeline-section{padding:0}#map{height:480px}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-label">Saturday itinerary</div>
  <h1>서울대공원<br>토요일 코스</h1>
  <div class="hero-meta">
    <span class="hero-chip"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>11:10 AM — 5:00 PM</span>
    <span class="hero-chip"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>과천시 · 서울대공원</span>
    <span class="hero-chip"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>리프트 2회권 코스</span>
  </div>
</div>
<div class="stats-bar">
  <div class="stat-item"><div class="stat-val">5.5h</div><div class="stat-label">총 소요</div></div>
  <div class="stat-item"><div class="stat-val">~3.5km</div><div class="stat-label">도보 거리</div></div>
  <div class="stat-item"><div class="stat-val">23,000원</div><div class="stat-label">성인 총 비용</div></div>
</div>
<div class="content-grid">
  <div class="map-section">
    <div class="map-wrap"><div id="map"></div></div>
    <div class="route-legend">
      <span><span class="legend-line" style="background:#0EA5E9"></span>1호선 (외부)</span>
      <span><span class="legend-line" style="background:#F59E0B"></span>2호선 (내부)</span>
      <span><span class="legend-line" style="background:transparent;border-top:2px dashed #2D6A4F;height:0;width:20px"></span>도보</span>
    </div>
  </div>
  <div class="timeline-section">
    <div class="section-title">코스 일정</div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>
<div class="footer">지도 데이터 © OpenStreetMap contributors · Leaflet<br>서울대공원 토요일 코스 · 2026년 4월 · 방법 A (리프트 2회권)</div>

<script>
const stops = [
  {num:1, color:'sky', name:'스카이리프트 1호선 (A→B)', time:'11:30 — 11:45',
   desc:'대공원 광장 A 탑승장에서 출발. 청계산과 호수를 내려다보며 동물원 입구(북문) 방면까지 약 10분 공중 산책.',
   tags:['1호선 외부','약 10분','1구간 사용'],
   tip:'토요일 오전은 대기가 짧은 편. 12시 넘으면 30분 이상 대기!',
   lat:37.431687, lng:127.009437, markerColor:'#3B82F6'},

  {num:2, color:'amber', name:'스카이리프트 2호선 (C→D)', time:'11:45 — 12:00',
   desc:'동물원 북문 안쪽 C 탑승장에서 환승. 동물원 최상단 맹수사·동양관 앞 D 탑승장까지 약 15분. 여기서부터 내리막 관람 시작!',
   tags:['2호선 내부','약 15분','1구간 사용'],
   tip:'2호선은 동물원 입장권이 있어야 탈 수 있어요. 리프트 매표소에서 함께 구매!',
   lat:37.4220, lng:127.0235, markerColor:'#D97706'},

  {num:3, color:'green', name:'동물원 내리막 관람', time:'12:00 — 14:30',
   desc:'맹수사(호랑이·사자) → 곰사 → 유인원관 → 해양관 → 대동물관(기린·코끼리) → 제1아프리카관까지. 2시간 반이니 급할 필요 없이 구석구석 여유롭게.',
   tags:['약 2시간 30분','완전 내리막','Lion Cafe'],
   tip:'Lion Cafe에서 사자 보며 간식, 레서판다 앞에서 사진, 남미관·호주관까지 시간 여유 있어요!',
   lat:37.42612, lng:127.01927, markerColor:'#2D6A4F'},

  {num:4, color:'rose', name:'점심 식사', time:'14:30 — 15:00',
   desc:'동물원 내 분식점·매점에서 가볍게 해결하거나, 동물원 정문 밖 잔디광장에서 도시락 피크닉.',
   tags:['약 30분','매점/도시락'],
   tip:'토요일 점심은 매점이 붐벼요. 도시락이나 간식 미리 준비하면 여유롭게!',
   lat:37.4285, lng:127.0159, markerColor:'#E11D48'},

  {num:5, color:'purple', name:'테마가든 산책', time:'15:00 — 16:45',
   desc:'동물원 밖 별도 구역. 장미원·어린이동물원·호수 산책로를 1시간 45분 동안 여유롭게 산책. 4월 초라 벚꽃과 봄꽃이 절정인 시기.',
   tags:['약 1시간 45분','별도 입장 2,000원','포토존'],
   tip:'시간 여유가 있다면 호수 둘레길 끝에 있는 국립현대미술관 과천(도보 10분)도 들를 수 있어요. 토요일 10시~6시 개관.',
   lat:37.430682, lng:127.015502, markerColor:'#7C3AED'},

  {num:6, color:'gray', name:'도보로 대공원역 복귀', time:'16:45 — 17:00',
   desc:'테마가든에서 호숫가 산책로를 따라 대공원역까지 도보 약 15분. 여유롭게 하루를 마무리.',
   tags:['도보 15분','4호선 대공원역'],
   tip:'',
   lat:37.4337, lng:127.0117, markerColor:'#78716C'}
];

// ─── Render timeline ───
const timeline = document.getElementById('timeline');

// Pre-step
const preDiv = document.createElement('div');
preDiv.className = 'pre-step';
preDiv.innerHTML = `
  <div class="stop-dot">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M12 2v20M5 9l7-7 7 7"/></svg>
  </div>
  <div class="pre-card">
    <div class="stop-time">11:10 — 11:30 · 도착 & 준비</div>
    <div class="stop-name">서울대공원역 도착 · 티켓 구매</div>
    <div class="stop-desc">4호선 대공원역 2번 출구 → 분수대 광장 방향 도보 5분 → 종합안내소 앞 잔디광장에서 우측 200m 지점에 스카이리프트 매표소.</div>
    <div class="ticket-section">
      <div class="ticket-section-title">이 코스 필요 티켓 (성인 기준 총 23,000원)</div>
      <div class="ticket-grid">
        <div class="ticket-row"><span class="t-name">스카이리프트 2회권<small>2개 구간 · 리프트 매표소</small></span><span class="t-price">16,000원</span></div>
        <div class="ticket-row"><span class="t-name">동물원 입장<small>19세 이상 · 동물원 게이트</small></span><span class="t-price">5,000원</span></div>
        <div class="ticket-row"><span class="t-name">테마가든 입장<small>별도 구역 · 테마가든 입구</small></span><span class="t-price">2,000원</span></div>
      </div>
    </div>
    <div class="ticket-section">
      <div class="ticket-section-title">구매 장소</div>
      <div class="ticket-grid">
        <div class="ticket-row"><span class="t-name">리프트 2회권</span><span class="t-price" style="font-weight:400;color:var(--text-sub)">A탑승장 매표소 (분수대에서 우측 200m)</span></div>
        <div class="ticket-row"><span class="t-name">동물원 입장권</span><span class="t-price" style="font-weight:400;color:var(--text-sub)">동물원 정문 게이트 (QR 가능)</span></div>
        <div class="ticket-row"><span class="t-name">테마가든 입장권</span><span class="t-price" style="font-weight:400;color:var(--text-sub)">테마가든 입구 현장 구매</span></div>
      </div>
    </div>
    <div class="ticket-combo">
      <div class="combo-label">왜 2회권?</div>
      <div class="combo-desc">1호선(광장→동물원 입구) + 2호선(동물원 입구→꼭대기 맹수사)으로 2회 사용. 꼭대기에서 내리막 관람하면 체력 소모가 확 줄어요. 복귀는 이미 아래쪽이라 도보 15분이면 OK!</div>
    </div>
    <div class="ticket-links">
      <a class="ticket-link" href="https://www.klook.com/ko/activity/55718" target="_blank" rel="noopener">Klook ↗</a>
      <a class="ticket-link" href="https://www.kkday.com/ko/product/105602" target="_blank" rel="noopener">KKday ↗</a>
      <a class="ticket-link" href="https://www.waug.com/ko/activities/113546" target="_blank" rel="noopener">Waug ↗</a>
      <a class="ticket-link" href="https://home-ticket.co.kr/skylift/" target="_blank" rel="noopener">공식 예매 ↗</a>
    </div>
    <div class="pre-tip">리프트 2회권은 온라인에서도 구매 가능. 동물원 입장권은 Klook 등 QR 티켓으로 사면 줄을 건너뛸 수 있어요. 스카이리프트는 2026년 중 곤돌라 교체로 운행 중단 예정 — 방문 전 <b>skylift.co.kr</b>에서 꼭 확인!</div>
  </div>`;
timeline.appendChild(preDiv);

// Render stops
stops.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'stop';
  div.dataset.color = s.color;
  div.dataset.index = i;
  div.innerHTML = `
    <div class="stop-dot">${s.num}</div>
    <div class="stop-card">
      <div class="stop-time">${s.time}</div>
      <div class="stop-name">${s.name}</div>
      <div class="stop-desc">${s.desc}</div>
      <div class="stop-tags">${s.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
      ${s.tip ? '<div class="stop-tip">' + s.tip + '</div>' : ''}
    </div>`;
  div.addEventListener('click', () => activateStop(i));
  timeline.appendChild(div);
});

// ─── Map ───
const stationCoords = [37.4337, 127.0117];
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.429, 127.016], 15);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution: '© OpenStreetMap' }).addTo(map);

// Station marker
const stIcon = L.divIcon({ className: '', html: '<div class="custom-marker" style="background:#0EA5E9;width:28px;height:28px;font-size:11px;border-width:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M5 9l7-7 7 7"/></svg></div>', iconSize:[28,28], iconAnchor:[14,14] });
L.marker(stationCoords, { icon: stIcon }).addTo(map).bindPopup('<b>대공원역 2번 출구</b><div class="popup-time">11:10 도착 · 티켓 구매</div>');

// Stop markers
const markers = stops.map((s, i) => {
  const icon = L.divIcon({ className: '', html: '<div class="custom-marker" id="marker-' + i + '" style="background:' + s.markerColor + '">' + s.num + '</div>', iconSize:[32,32], iconAnchor:[16,16] });
  const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
  m.bindPopup('<b>' + s.name + '</b><div class="popup-time">' + s.time + '</div>');
  m.on('click', () => activateStop(i));
  return m;
});

// Route polyline
const latlngs = [stationCoords, ...stops.map(s => [s.lat, s.lng])];
L.polyline(latlngs, { color:'#2D6A4F', weight:3, opacity:.5, dashArray:'8 6', lineCap:'round' }).addTo(map);
map.fitBounds(latlngs, { padding:[30,30] });

// ─── Interaction ───
let activeIndex = -1;
function activateStop(i) {
  document.querySelectorAll('.stop').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.custom-marker').forEach(el => el.classList.remove('highlight'));
  const stop = document.querySelector('.stop[data-index="' + i + '"]');
  const mel = document.getElementById('marker-' + i);
  if (activeIndex === i) { activeIndex = -1; map.flyTo([37.429, 127.016], 15, {duration:.5}); return; }
  activeIndex = i;
  if (stop) { stop.classList.add('active'); stop.scrollIntoView({behavior:'smooth',block:'center'}); }
  if (mel) mel.classList.add('highlight');
  map.flyTo([stops[i].lat, stops[i].lng], 16, {duration:.5});
  markers[i].openPopup();
}
</script>
</body>
</html>
